name: build-windows
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Bump version on merge to release"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - internal: false
            name: "Release"
          - internal: true
            name: "Internal"

    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build
        shell: pwsh
        run: |
          $extra_args = if ("${{ matrix.internal }}" -eq "true") { @("--features", "mock-licensing") } else { @() }
          npm run tauri build -- --target x86_64-pc-windows-msvc @extra_args

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.internal && 'internal' || 'release' }}
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Copy versionless installer (release only)
        run: |
          cp artifacts/release/*.msi "artifacts/release/SEO.Insikt.crawler-setup.msi" 2>/dev/null || true

      - name: Rename internal assets
        run: |
          for f in artifacts/internal/*.msi; do
            if [ -f "$f" ]; then
              mv "$f" "${f%.msi}-internal.msi"
            fi
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: app-v${{ steps.get_version.outputs.version }}
          name: "App v${{ steps.get_version.outputs.version }}"
          prerelease: false
          files: |
            artifacts/release/*.msi
            artifacts/internal/*.msi
