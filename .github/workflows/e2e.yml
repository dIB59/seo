name: e2e

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  windows-tests:
    name: Windows npm tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./

      - name: Install tauri-driver
        run: |
          cargo install tauri-driver --locked || true

      - name: Run Tauri E2E tests
        run: npm test
        env:
          CI: true
        working-directory: ./
