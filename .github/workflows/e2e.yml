name: e2e

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "src-tauri/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "src/**"
      - "src-tauri/**"
      - ".github/workflows/e2e.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  windows-tests:
    name: Windows npm tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ./

      - name: Cache tauri-driver binary
        id: cache-tauri-driver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/tauri-driver.exe
          key: tauri-driver-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install tauri-driver
        if: steps.cache-tauri-driver.outputs.cache-hit != 'true'
        run: cargo install tauri-driver --locked

      - name: Run Tauri E2E tests
        run: npm test
        env:
          CI: true
        working-directory: ./
